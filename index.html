  <!-- Three.js -->

  <link rel="stylesheet" href="css/style.css">

<body class="index-page">

  <nav>
    <a href="#" data-section="introduction">Introduction</a>
    <a href="#" data-section="projects">Projects</a>
    <a href="#" data-section="skills">Skills</a>
    <a href="#" data-section="about">About</a>
    <a href="#" data-section="contact">Contact</a>
  </nav>

  <!-- 3D SCENE -->
  <canvas id="space-canvas"></canvas>

  <!-- HORIZONTAL SECTIONS -->
  <div class="container">
    <section class="panel" id="introduction">
      <div class="welcome">
        <h1>HI,<br> WELCOME<br> TO THE<br> SPACESHIP<br>THIS IS<br> YOUR CAPTAIN<br> SAMRIDHA<br> SHRESTHA</h1>
        <img src="images/Sam.webp" alt="Samridha" class="captain-photo">
      </div>
      <div class="planet-label">Planet: Introduction</div>
      <div class="instructions">Scroll to move <br>Click to display</div>
    </section>
    <section class="panel" id="projects">
      <div class="planet-label">Planet: Projects</div>
    </section>
    <section class="panel" id="skills">
      <div class="planet-label">Planet: Skills</div>
    </section>
    <section class="panel" id="about">
      <div class="planet-label">Planet: About</div>
    </section>
    <section class="panel" id="contact">
      <div class="planet-label">Planet: Contact</div>
    </section>
  </div>

  <audio id="bg-audio" autoplay loop>
    <source src="audio/Interstellar.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <button onclick="toggleAudio()" class="audio-btn" id="audio-btn">🔊</button>

  <script>
    function toggleAudio() {
      const audio = document.getElementById("bg-audio");
      const btn = document.getElementById("audio-btn");
      audio.muted = !audio.muted;
      btn.textContent = audio.muted ? "🔇" : "🔊";
    }
  </script>

  <script src="js/threeScene.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
